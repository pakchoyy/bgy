<!-- ═══════════════════════════════════════════════════════════
     PERUBAHAN 2: GANTI SELURUH FUNGSI exportPDF()

<script>
/* ════════════════════════════════════════════
   EXPORT PDF v2 — html2canvas + jsPDF
   Download langsung tanpa print dialog,
   tanpa header/footer browser, tanpa ikon pensil
════════════════════════════════════════════ */
async function exportPDF(mode){
  if(!soalData){alert('Generate soal terlebih dahulu.');return;}
  const mapel=document.getElementById('mataPelajaran').value;
  const kelas=document.getElementById('kelas').value;
  gaEvent('download_pdf',{kelas:'Kelas '+kelas,mata_pelajaran:mapel,tipe_user:isPro()?'pro':'free',mode:mode||'all'});

  // Tentukan halaman yang diekspor
  let idxArr=[];
  const total=halamanSoal.length;
  if(mode==='soal'){
    for(let i=0;i<total-2;i++)idxArr.push(i);
  }else if(mode==='kunci'){
    for(let i=0;i<total-1;i++)idxArr.push(i);
  }else if(mode==='kisi'){
    idxArr=[total-1];
  }else{ // all
    for(let i=0;i<total;i++)idxArr.push(i);
  }
  if(!idxArr.length)idxArr=[0];

  // Feedback & disable tombol
  const btn=document.getElementById('btnPDF');
  const origHtml=btn?btn.innerHTML:'';
  if(btn){btn.innerHTML='⏳ Menyiapkan PDF...';btn.disabled=true;}
  showGenerateFeedback('📄 Membuat PDF, mohon tunggu sebentar...',0);

  try{
    if(typeof html2canvas==='undefined')throw new Error('html2canvas belum load');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const A4_W=210,A4_H=297;

    // Container render tersembunyi — lebar 794px = A4 @96dpi
    const hidden=document.createElement('div');
    hidden.style.cssText=
      'position:fixed;top:-99999px;left:-99999px;width:794px;'+
      'background:#fff;padding:13mm 15mm 13mm 17mm;'+
      'box-sizing:border-box;font-family:Times New Roman,Times,serif;'+
      'font-size:11pt;line-height:1.55;color:#000;z-index:-9999;';
    document.body.appendChild(hidden);

    for(let p=0;p<idxArr.length;p++){
      const hi=idxArr[p];

      // Render halaman ke dalam hidden div
      hidden.innerHTML=halamanSoal[hi];

      // Hapus elemen UI yang tidak perlu dicetak
      hidden.querySelectorAll('button,[contenteditable]').forEach(el=>{
        if(el.tagName==='BUTTON')el.style.display='none';
        if(el.hasAttribute('contenteditable'))el.removeAttribute('contenteditable');
      });
      // Sembunyikan loading gambar
      hidden.querySelectorAll('.soal-img-loading').forEach(el=>el.style.display='none');

      // Inject CSS fix untuk render
      let styleEl=hidden.querySelector('style.pdf-fix');
      if(!styleEl){
        styleEl=document.createElement('style');
        styleEl.className='pdf-fix';
        hidden.insertBefore(styleEl,hidden.firstChild);
      }
      styleEl.textContent=`
        button{display:none!important;}
        .soal-img-loading{display:none!important;}
        .uraian-kotak{border:1px solid #bbb!important;width:100%!important;height:44px!important;display:block!important;margin-top:3px!important;}
        .isian-garis{display:inline-block!important;border-bottom:1px solid #000!important;min-width:160px!important;width:54%!important;height:12px!important;vertical-align:bottom!important;}
        .doc-header-line{border-top:3px solid #000!important;border-bottom:3px solid #000!important;height:4px!important;margin:5px 0 9px!important;display:block!important;}
        .doc-identitas-line{border-top:3px solid #000!important;border-bottom:3px solid #000!important;height:4px!important;margin:7px 0 9px!important;display:block!important;}
        .kisi-table th{background:#e8f0ef!important;border:1px solid #555!important;}
        .kisi-table td{border:1px solid #999!important;}
        .kunci-pg-cell{border:1px solid #ccc!important;text-align:center!important;}
        table{border-collapse:collapse!important;}
        *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
      `;

      // Tunggu gambar
      const imgs=[...hidden.querySelectorAll('img')];
      await Promise.allSettled(imgs.map(img=>new Promise(res=>{
        if(img.complete&&img.naturalWidth>0)res();
        else{img.onload=res;img.onerror=res;setTimeout(res,2000);}
      })));

      // Render ke canvas
      const canvas=await html2canvas(hidden,{
        scale:2,
        useCORS:true,
        allowTaint:true,
        backgroundColor:'#ffffff',
        logging:false,
        removeContainer:false
      });

      const imgData=canvas.toDataURL('image/jpeg',0.92);
      const cW=canvas.width,cH=canvas.height;
      const renderedH=(cH/cW)*A4_W;

      if(p>0)pdf.addPage();

      if(renderedH<=A4_H){
        // Halaman muat dalam 1 A4
        pdf.addImage(imgData,'JPEG',0,0,A4_W,renderedH);
      }else{
        // Potong otomatis kalau lebih dari 1 halaman
        const ratio=A4_W/cW;
        const slicePixels=Math.floor(A4_H/ratio);
        let yOff=0;let isFirst=true;
        while(yOff<cH){
          const sh=Math.min(slicePixels,cH-yOff);
          const sc=document.createElement('canvas');
          sc.width=cW;sc.height=sh;
          const ctx=sc.getContext('2d');
          ctx.fillStyle='#fff';ctx.fillRect(0,0,cW,sh);
          ctx.drawImage(canvas,0,yOff,cW,sh,0,0,cW,sh);
          if(!isFirst)pdf.addPage();
          pdf.addImage(sc.toDataURL('image/jpeg',0.92),'JPEG',0,0,A4_W,sh*ratio);
          yOff+=sh;isFirst=false;
        }
      }
    }

    document.body.removeChild(hidden);

    const suffix=mode&&mode!=='all'?'_'+mode:'';
    const fname=`Soal_${mapel.replace(/[\s\/\\:*?"<>|]/g,'_')}_Kelas${kelas}${suffix}.pdf`;
    pdf.save(fname);
    showGenerateFeedback('✅ PDF berhasil diunduh!',3000);

  }catch(e){
    console.error('exportPDF error:',e);
    // Bersihkan hidden div kalau ada
    const hd=document.querySelector('[style*="top:-99999px"]');
    if(hd)try{document.body.removeChild(hd);}catch(_){}
    showGenerateFeedback('',0);
    // Fallback ke print
    const pakai=confirm(
      '⚠️ Download PDF otomatis gagal.\n\n'+
      'Mau coba lewat dialog cetak?\n'+
      '(Pilih "Save as PDF" / "Microsoft Print to PDF" di dialog cetak)\n\n'+
      'Catatan: Untuk menghilangkan header/footer, nonaktifkan "Headers and footers" di pengaturan cetak.'
    );
    if(pakai)exportPDFFallback(mode);
  }finally{
    if(btn){btn.innerHTML=origHtml;btn.disabled=false;}
  }
}

/* Fallback print window */
function exportPDFFallback(mode){
  const mapel=document.getElementById('mataPelajaran').value;
  const kelas=document.getElementById('kelas').value;
  let pagesToPrint=halamanSoal;
  if(mode==='soal') pagesToPrint=halamanSoal.slice(0,Math.max(1,halamanSoal.length-2));
  else if(mode==='kunci') pagesToPrint=halamanSoal.slice(0,Math.max(1,halamanSoal.length-1));
  else if(mode==='kisi') pagesToPrint=halamanSoal.slice(-1);
  const allContent=pagesToPrint.map((h,i)=>
    i===0?h:`<div style="page-break-before:always;">${h}</div>`
  ).join('');
  const printWin=window.open('','_blank','width=900,height=700');
  if(!printWin){alert('Popup diblokir browser. Izinkan popup untuk halaman ini.');return;}
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Soal_${mapel}_Kelas${kelas}</title>
  <style>
    @page{size:A4;margin:15mm 20mm 15mm 22mm;}
    html,body{margin:0;padding:0;}
    body{font-family:'Times New Roman',Times,serif;font-size:11pt;line-height:1.55;color:#000;}
    button{display:none!important;}
    .doc-header-line{border-top:3px solid #000;border-bottom:3px solid #000;height:4px;margin:5px 0 9px;}
    .doc-identitas-line{border-top:3px solid #000;border-bottom:3px solid #000;height:4px;margin:7px 0 9px;}
    .doc-identitas-table{width:100%;font-size:10.5pt;border-collapse:collapse;}
    .id-label{width:105px;}.id-sep{width:10px;}.id-value{border-bottom:1px solid #333;}
    .doc-section-title{font-weight:bold;text-decoration:underline;font-size:11pt;margin:10px 0 2px;}
    .doc-petunjuk{font-style:italic;font-size:10pt;margin-bottom:5px;}
    .doc-soal-table{width:100%;border-collapse:collapse;}
    .soal-no{width:22px;vertical-align:top;}
    .opsi-table{width:100%;border-collapse:collapse;margin-top:2px;}
    .opsi-label{width:22px;}.opsi-teks{width:44%;}
    .isian-garis{display:inline-block;border-bottom:1px solid #000;width:55%;min-width:120px;}
    .uraian-kotak{border:1px solid #bbb;width:100%;height:44px;margin-top:3px;}
    .kunci-page-header{font-size:14pt;font-weight:bold;text-align:center;text-transform:uppercase;}
    .kunci-page-sub{font-size:10pt;text-align:center;margin-bottom:4px;}
    .kunci-page-line{border-top:3px solid #000;border-bottom:3px solid #000;height:4px;margin:0 0 16px;}
    .kunci-section-title{font-size:11pt;font-weight:bold;text-decoration:underline;margin:12px 0 8px;}
    .kunci-pg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px;}
    .kunci-pg-cell{border:1px solid #ccc;padding:4px 6px;font-size:10.5pt;text-align:center;}
    .kunci-isian-table,.kunci-uraian-table{width:100%;border-collapse:collapse;font-size:11pt;margin-bottom:10px;}
    .kunci-isian-table td,.kunci-uraian-table td{padding:3px 6px;border-bottom:1px solid #eee;}
    .kisi-page-header{font-size:13pt;font-weight:bold;text-align:center;text-transform:uppercase;}
    .kisi-page-sub{font-size:10pt;text-align:center;margin-bottom:6px;}
    .kisi-page-line{border-top:3px solid #000;border-bottom:3px solid #000;height:4px;margin:0 0 12px;}
    .kisi-table{width:100%;border-collapse:collapse;font-size:9pt;}
    .kisi-table th{background:#e8f0ef;border:1px solid #555;padding:4px 5px;text-align:center;font-weight:bold;}
    .kisi-table td{border:1px solid #999;padding:3px 5px;vertical-align:top;}
    img{max-width:100%;}.soal-img-loading{display:none!important;}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  </style>
  <script>window.onload=function(){setTimeout(function(){window.print();},600);};<\/script>
  </head><body>${allContent}</body></html>`);
  printWin.document.close();
}


/* ════════════════════════════════════════════
   EXPORT WORD v2 — docx.js robust
   Tampilan mirip preview: font, garis, header
════════════════════════════════════════════ */
async function exportWord(){
  if(!soalData){alert('Generate soal terlebih dahulu.');return;}
  if(typeof window.docx==='undefined'){alert('Library docx belum siap, tunggu sebentar lalu coba lagi.');return;}

  const {
    Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
    AlignmentType,BorderStyle,WidthType,PageBreak,
    VerticalAlign,ShadingType,UnderlineType
  }=window.docx;

  const pg    =soalData.pilihanGanda||[];
  const isian =soalData.isian||[];
  const uraian=soalData.uraian||[];
  const mapel      =document.getElementById('mataPelajaran').value||'Mata Pelajaran';
  const kelas      =document.getElementById('kelas').value||'1';
  const namaSekolah=document.getElementById('namaSekolah').value||'SDN ---';
  const tahun      =document.getElementById('tahunPelajaran').value||'2025/2026';
  const judulUjian =getJudulUjian();
  const kelasNum   =parseInt(kelas)||1;
  const fase       =kelasNum<=2?'A':kelasNum<=4?'B':'C';
  const semester   =document.getElementById('semester').value||'1';
  const tanggal    =document.getElementById('tanggal').value
    ?new Date(document.getElementById('tanggal').value).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})
    :'.....................';
  const bobotPG=1,bobotIsian=2,bobotUraian=4;
  const totalSkor=pg.length*bobotPG+isian.length*bobotIsian+uraian.length*bobotUraian;

  gaEvent('download_word',{kelas:'Kelas '+kelas,mata_pelajaran:mapel,tipe_user:isPro()?'pro':'free'});

  // Layout
  const TNR='Times New Roman';
  const W=11906-1701-1418; // ~8787 DXA
  const NO_BORDER={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  const NO_BORDERS={top:NO_BORDER,bottom:NO_BORDER,left:NO_BORDER,right:NO_BORDER,insideH:NO_BORDER,insideV:NO_BORDER};
  const CELL_BD={style:BorderStyle.SINGLE,size:4,color:'555555'};
  const ALL_BD={top:CELL_BD,bottom:CELL_BD,left:CELL_BD,right:CELL_BD};

  // ── Helpers ──
  function r(text,opts={}){
    return new TextRun({
      text:String(text||''),font:TNR,size:opts.size||22,
      bold:opts.bold||false,italics:opts.italic||false,
      underline:opts.underline?{type:UnderlineType.SINGLE}:undefined
    });
  }
  function p(runs,opts={}){
    return new Paragraph({
      alignment:opts.align||AlignmentType.LEFT,
      spacing:{before:opts.before||0,after:opts.after||60,line:276},
      indent:opts.indent?{left:opts.indent}:undefined,
      border:opts.borderTop?{top:{style:BorderStyle.THICK,size:18,color:'000000'}}:undefined,
      children:Array.isArray(runs)?runs:[runs]
    });
  }
  function cNB(ch,opts={}){ // cell no border
    return new TableCell({
      borders:NO_BORDERS,
      width:opts.w?{size:opts.w,type:WidthType.DXA}:undefined,
      margins:{top:40,bottom:40,left:opts.lm||80,right:60},
      verticalAlign:VerticalAlign.TOP,
      children:Array.isArray(ch)?ch:[ch]
    });
  }
  function cBD(ch,opts={}){ // cell bordered
    return new TableCell({
      borders:ALL_BD,
      width:opts.w?{size:opts.w,type:WidthType.DXA}:undefined,
      shading:opts.sh?{fill:opts.sh,type:ShadingType.CLEAR}:undefined,
      margins:{top:60,bottom:60,left:80,right:80},
      verticalAlign:VerticalAlign.CENTER,
      children:Array.isArray(ch)?ch:[ch]
    });
  }
  function garis(){
    return new Paragraph({
      border:{top:{style:BorderStyle.THICK,size:18,color:'000000'}},
      spacing:{before:80,after:80},children:[]
    });
  }
  function garisHalus(){
    return new Paragraph({
      border:{top:{style:BorderStyle.SINGLE,size:6,color:'000000'}},
      spacing:{before:60,after:60},children:[]
    });
  }
  function brk(){ return new Paragraph({children:[new PageBreak()]}); }

  // ── Header ──
  function header(){
    const items=[];
    items.push(p([r(judulUjian,{bold:true,size:22})],{align:AlignmentType.CENTER,after:40}));
    items.push(p([r(namaSekolah,{bold:true,size:32})],{align:AlignmentType.CENTER,after:40}));
    items.push(p([r('Tahun Pelajaran '+tahun,{size:22})],{align:AlignmentType.CENTER,after:80}));
    items.push(garis());

    const hw=Math.floor(W/2);
    const c0=[
      [1600,':',mapel,        hw-1800,'Nama',    ':','_'.repeat(24)],
      [1600,':',`${kelas} / Fase ${fase}`,hw-1800,'No. Absen',':','_'.repeat(14)],
      [1600,':',tanggal,      hw-1800,'Nilai',   ':','_'.repeat(14)],
    ];
    const identRows=c0.map(d=>new TableRow({children:[
      cNB(p([r(d[0]===1600?(['Mata Pelajaran','Kelas / Fase','Tanggal'][c0.indexOf(d)]||''):d[0],{size:22})]),{w:1600}),
      cNB(p([r(d[1],{size:22})]),{w:180}),
      cNB(p([r(d[2],{size:22})]),{w:hw-1800}),
      cNB(p([r('',{size:22})]),{w:300}),
      cNB(p([r(d[4],{size:22})]),{w:1400}),
      cNB(p([r(d[5],{size:22})]),{w:180}),
      cNB(p([r(d[6],{size:22})]),{w:hw-1900}),
    ]}));
    // Patch: isi label dengan nama field yang benar
    const labels=['Mata Pelajaran','Kelas / Fase','Tanggal'];
    const vals=[mapel,`${kelas} / Fase ${fase}`,tanggal];
    const rLabel=['Nama','No. Absen','Nilai'];
    const rVals=['_'.repeat(24),'_'.repeat(14),'_'.repeat(14)];
    const fixedRows=labels.map((lbl,i)=>new TableRow({children:[
      cNB(p([r(lbl,{size:22})]),{w:1600}),
      cNB(p([r(':',{size:22})]),{w:180}),
      cNB(p([r(vals[i],{size:22})]),{w:hw-1800}),
      cNB(p([r('',{size:22})]),{w:300}),
      cNB(p([r(rLabel[i],{size:22})]),{w:1400}),
      cNB(p([r(':',{size:22})]),{w:180}),
      cNB(p([r(rVals[i],{size:22})]),{w:hw-1900}),
    ]}));
    const colW=[1600,180,hw-1800,300,1400,180,hw-1900];
    items.push(new Table({
      width:{size:W,type:WidthType.DXA},
      columnWidths:colW,borders:NO_BORDERS,
      rows:fixedRows
    }));
    items.push(garisHalus());
    items.push(p([r('')],{after:40}));
    return items;
  }

  // ── PG ──
  function soalPG(){
    if(!pg.length)return[];
    const out=[];
    out.push(p([r('I. Pilihan Ganda',{bold:true,underline:true,size:22})],{before:120,after:40}));
    out.push(p([r('Berilah tanda silang (X) pada huruf jawaban yang paling benar!',{italic:true,size:20})],{after:80}));
    pg.forEach((item,i)=>{
      const txt=stripHtml(item.soal||'');
      const noW=420,txW=W-noW;
      out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:[noW,txW],borders:NO_BORDERS,
        rows:[new TableRow({children:[
          cNB(p([r(`${i+1}.`,{bold:true,size:22})]),{w:noW}),
          cNB(p([r(txt,{size:22})]),{w:txW}),
        ]})]}));
      const opsi=item.opsi||[];
      const hw=Math.floor(W/2);
      const opsiRows=[];
      for(let oi=0;oi<opsi.length;oi+=2){
        function hrf(s){const m=String(s||'').match(/^([A-Da-d])[\.\)\-\s]*/);return m?m[1].toUpperCase()+'. ':String.fromCharCode(65+oi)+'. ';}
        function tks(s){const m=String(s||'').match(/^[A-Da-d][\.\)\-\s]+\s*([\s\S]*)/);return m?m[1].trim():String(s||'');}
        const o1=hrf(opsi[oi])+tks(opsi[oi]);
        const o2=oi+1<opsi.length?hrf(opsi[oi+1])+tks(opsi[oi+1]):'';
        opsiRows.push(new TableRow({children:[
          cNB(p([r(o1,{size:21})]),{w:hw,lm:440}),
          cNB(p([r(o2,{size:21})]),{w:hw}),
        ]}));
      }
      if(opsiRows.length)out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:[Math.floor(W/2),Math.floor(W/2)],borders:NO_BORDERS,rows:opsiRows}));
      out.push(p([r('')],{after:40}));
    });
    return out;
  }

  // ── Isian ──
  function soalIsian(){
    if(!isian.length)return[];
    const out=[];
    out.push(p([r('II. Isian Singkat',{bold:true,underline:true,size:22})],{before:200,after:40}));
    out.push(p([r('Isilah titik-titik berikut dengan jawaban yang tepat!',{italic:true,size:20})],{after:80}));
    isian.forEach((item,i)=>{
      const txt=stripHtml(item.soal||'');
      const noW=420,txW=W-noW;
      out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:[noW,txW],borders:NO_BORDERS,
        rows:[new TableRow({children:[
          cNB(p([r(`${pg.length+i+1}.`,{bold:true,size:22})]),{w:noW}),
          cNB(p([r(txt,{size:22})]),{w:txW}),
        ]})]}));
      out.push(p([r('Jawab : '+'_'.repeat(50),{size:22})],{indent:420,after:80}));
    });
    return out;
  }

  // ── Uraian ──
  function soalUraian(){
    if(!uraian.length)return[];
    const out=[];
    out.push(p([r('III. Uraian',{bold:true,underline:true,size:22})],{before:200,after:40}));
    out.push(p([r('Jawablah pertanyaan berikut dengan lengkap dan benar!',{italic:true,size:20})],{after:80}));
    uraian.forEach((item,i)=>{
      const txt=stripHtml(item.soal||'');
      const noW=420,txW=W-noW;
      out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:[noW,txW],borders:NO_BORDERS,
        rows:[new TableRow({children:[
          cNB(p([r(`${pg.length+isian.length+i+1}.`,{bold:true,size:22})]),{w:noW}),
          cNB(p([r(txt,{size:22})]),{w:txW}),
        ]})]}));
      for(let l=0;l<3;l++)out.push(p([r('_'.repeat(88),{size:22})],{indent:420,after:40}));
      out.push(p([r('')],{after:60}));
    });
    return out;
  }

  // ── Kunci ──
  function halamanKunci(){
    const out=[];
    out.push(p([r('KUNCI JAWABAN',{bold:true,size:28})],{align:AlignmentType.CENTER,after:40}));
    out.push(p([r(judulUjian+' — '+namaSekolah,{size:22})],{align:AlignmentType.CENTER,after:30}));
    out.push(p([r(`${mapel} | Kelas ${kelas} / Fase ${fase}`,{size:22})],{align:AlignmentType.CENTER,after:30}));
    out.push(p([r(`Bobot: PG=${bobotPG}pt | Isian=${bobotIsian}pt | Uraian=${bobotUraian}pt | Total Maks: ${totalSkor} poin`,{italic:true,size:20})],{align:AlignmentType.CENTER,after:80}));
    out.push(garis());

    if(pg.length>0){
      out.push(p([r('I. Pilihan Ganda',{bold:true,underline:true,size:22})],{before:100,after:60}));
      const cols=5;const cw=Math.floor(W/cols);
      const pgRows=[];
      for(let ri=0;ri<Math.ceil(pg.length/cols);ri++){
        const cells=[];
        for(let ci=0;ci<cols;ci++){
          const idx=ri*cols+ci;
          const isi=idx<pg.length?`${idx+1}. ${stripHtml(pg[idx].jawaban||'—')}`:'';
          cells.push(cBD(p([r(isi,{size:20})],{align:AlignmentType.CENTER,after:0}),{w:cw}));
        }
        pgRows.push(new TableRow({children:cells}));
      }
      out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:Array(cols).fill(cw),rows:pgRows}));
    }
    if(isian.length>0){
      out.push(p([r('II. Isian Singkat',{bold:true,underline:true,size:22})],{before:120,after:60}));
      isian.forEach((item,i)=>out.push(p([r(`${pg.length+i+1}. `,{bold:true,size:22}),r(stripHtml(item.jawaban||'—'),{size:22})],{after:40})));
    }
    if(uraian.length>0){
      out.push(p([r('III. Uraian',{bold:true,underline:true,size:22})],{before:120,after:60}));
      uraian.forEach((item,i)=>out.push(p([r(`${pg.length+isian.length+i+1}. `,{bold:true,size:22}),r(stripHtml(item.jawaban||'—'),{size:22})],{after:40})));
    }
    out.push(p([r(`Nilai = (Skor Diperoleh ÷ ${totalSkor}) × 100`,{italic:true,size:20,bold:true})],{before:160,after:60}));
    return out;
  }

  // ── Kisi-kisi ──
  function halamanKisi(){
    const out=[];
    const dist=[pg.length?`PG: ${pg.length}`:'',isian.length?`Isian: ${isian.length}`:'',uraian.length?`Uraian: ${uraian.length}`:''].filter(Boolean).join(' | ');
    out.push(p([r('KISI-KISI SOAL',{bold:true,size:28})],{align:AlignmentType.CENTER,after:40}));
    out.push(p([r(judulUjian+' — '+namaSekolah,{size:22})],{align:AlignmentType.CENTER,after:30}));
    out.push(p([r(`${mapel} | Kelas ${kelas} / Fase ${fase} | Semester ${semester} | T.P. ${tahun}`,{size:20})],{align:AlignmentType.CENTER,after:30}));
    out.push(p([r(`Acuan: KepKaBSKAP No. 046/H/KR/2025 | Total: ${pg.length+isian.length+uraian.length} soal (${dist})`,{italic:true,size:18})],{align:AlignmentType.CENTER,after:80}));
    out.push(garis());

    const kc=[360,1400,4500,850,850,640];
    const kHdr=new TableRow({tableHeader:true,children:
      ['No','Materi','Indikator Soal','Level','Bentuk','No.Soal'].map((h,ci)=>
        cBD(p([r(h,{bold:true,size:18})],{align:AlignmentType.CENTER,after:0}),{w:kc[ci],sh:'E8F0EF'})
      )
    });
    const matArr=(lastMateriTerpilih||mapel).split(',').map(s=>s.trim()).filter(Boolean);
    function gm(i,t){return matArr.length?matArr[Math.floor((i/t)*matArr.length)]||matArr[0]:mapel;}
    const allS=[
      ...pg.map((it,i)=>({m:gm(i,Math.max(pg.length,1)),ind:it.indikator||stripHtml(it.soal).substring(0,85),lv:it.level||'C1',b:'PG',n:i+1})),
      ...isian.map((it,i)=>({m:gm(i,Math.max(isian.length,1)),ind:it.indikator||stripHtml(it.soal).substring(0,85),lv:it.level||'C2',b:'Isian',n:pg.length+i+1})),
      ...uraian.map((it,i)=>({m:gm(i,Math.max(uraian.length,1)),ind:it.indikator||stripHtml(it.soal).substring(0,85),lv:it.level||'C4',b:'Uraian',n:pg.length+isian.length+i+1}))
    ];
    const kRows=allS.map((s,idx)=>new TableRow({children:[
      cBD(p([r(String(idx+1),{size:18})],{align:AlignmentType.CENTER,after:0}),{w:kc[0]}),
      cBD(p([r(String(s.m||'').substring(0,40),{size:17})],{after:0}),{w:kc[1]}),
      cBD(p([r(String(s.ind||'').substring(0,120),{size:17})],{after:0}),{w:kc[2]}),
      cBD(p([r(String(s.lv||''),{size:17})],{align:AlignmentType.CENTER,after:0}),{w:kc[3]}),
      cBD(p([r(String(s.b||''),{size:17})],{align:AlignmentType.CENTER,after:0}),{w:kc[4]}),
      cBD(p([r(String(s.n||''),{size:17})],{align:AlignmentType.CENTER,after:0}),{w:kc[5]}),
    ]}));
    out.push(new Table({width:{size:W,type:WidthType.DXA},columnWidths:kc,rows:[kHdr,...kRows]}));
    out.push(p([r('C1=Mengingat | C2=Memahami | C3=Menerapkan | C4=Menganalisis | C5=Mengevaluasi | C6=Mencipta',{italic:true,size:17})],{before:120,after:60}));
    return out;
  }

  // ── Build & download ──
  const btn=document.querySelector('[onclick="exportWord()"]');
  const origTxt=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ Menyiapkan Word...';btn.disabled=true;}
  showGenerateFeedback('📝 Membuat file Word, mohon tunggu...',0);

  try{
    const doc=new Document({
      styles:{default:{document:{run:{font:TNR,size:22}}}},
      sections:[{
        properties:{page:{size:{width:11906,height:16838},margin:{top:1418,right:1418,bottom:1418,left:1701}}},
        children:[
          ...header(),
          ...soalPG(),
          ...soalIsian(),
          ...soalUraian(),
          brk(),
          ...halamanKunci(),
          brk(),
          ...halamanKisi(),
        ]
      }]
    });
    const base64=await Packer.toBase64String(doc);
    const bArr=new Uint8Array(atob(base64).split('').map(c=>c.charCodeAt(0)));
    const blob=new Blob([bArr],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`Soal_${mapel.replace(/[\s\/\\:*?"<>|]/g,'_')}_Kelas${kelas}.docx`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
    showGenerateFeedback('✅ File Word berhasil diunduh!',3000);
  }catch(e){
    console.error('exportWord error:',e);
    showGenerateFeedback('',0);
    alert('❌ Gagal membuat file Word.\n\nError: '+e.message+'\n\nSolusi:\n• Refresh halaman\n• Generate soal lagi\n• Coba lagi');
  }finally{
    if(btn){btn.textContent=origTxt;btn.disabled=false;}
  }
}
</script>
