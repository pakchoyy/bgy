<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bantu Guru Yuk</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .banner {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      color: white;
      transition: 0.2s;
    }

    .btn span {
      font-size: 18px;
    }

    .lkpd {
      background: #4f46e5;
    }

    .soal {
      background: #22c55e;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="banner">📚 Bantu Guru Yuk</div>
    <div class="sub">Media ajar cepat untuk guru SD</div>

    <div class="menu">
      <a href="/lkpd/" class="btn lkpd">
        📘 LKPD
        <span>→</span>
      </a>

      <a href="/soal/" class="btn soal">
        📝 Soal
        <span>→</span>
      </a>
    </div>

    <div class="footer">
      Gratis • Mudah • Siap Pakai
    </div>

  </div>

</body>
</html>
