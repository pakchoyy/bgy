<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantu Guru Yuk</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #e3f2fd, #ffffff);
  text-align: center;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 34px;
  color: #2c3e50;
}

p {
  color: #555;
  margin-bottom: 30px;
}

.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 20px;
  max-width: 320px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.lkpd { background: #4CAF50; }
.soal { background: #2196F3; }

footer {
  margin-top: 50px;
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="card">
  <h2>📘 LKPD</h2>
  <p>Buat lembar kerja siswa</p>
  <a href="/lkpd" class="btn lkpd">Masuk LKPD</a>
</div>

<div class="card">
  <h2>🧠 Soal</h2>
  <p>Buat soal otomatis</p>
  <a href="/soal" class="btn soal">Masuk Soal</a>
</div>

  <footer>
    © 2026 Bantu Guru Yuk
  </footer>
</div>

</body>
</html>
