<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bantu Guru Yuk | Prompt Generator Media Ajar</title>

<base href="/lkpd/">
<link rel="manifest" href="/lkpd/manifest.json">
<meta name="theme-color" content="#4dabf7">

<link rel="icon" href="/lkpd/guru-cibisd2.png" sizes="192x192">
<link rel="apple-touch-icon" href="/lkpd/guru-cibisd2.png">

<style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:#eef2f7;}
.header{background:linear-gradient(90deg,#6cc6a6,#4dabf7);color:#fff;padding:16px;text-align:center;}
.container{max-width:760px;margin:auto;background:#fff;padding:24px;border-radius:14px;margin-top:20px;}
label{font-weight:bold;display:block;margin-top:12px;}
textarea,select,input{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin-top:6px;}
button{width:100%;padding:12px;margin-top:12px;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer;}
.generate{background:#2f9e44;}
.copy{background:#1971c2;}
#notif{display:none;background:#2f9e44;color:#fff;padding:10px;margin-top:10px;border-radius:8px;text-align:center;}
</style>
</head>

<body>

<div class="header">
<h2>BANTU GURU YUK</h2>
<div>Prompt Generator Media Ajar</div>
</div>

<div class="container">

<label>Kelas</label>
<select id="kelas">
<option selected>SD Kelas 2</option>
<option>SD Kelas 1</option>
<option>SD Kelas 3</option>
<option>SMP</option>
<option>SMA</option>
</select>

<label>Mata Pelajaran</label>
<select id="mapel">
<option>Umum</option>
<option>Matematika</option>
<option>Bahasa Indonesia</option>
</select>

<label>Jenis Media</label>
<select id="media">
<option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
</select>

<label>Materi</label>
<textarea id="materi" placeholder="Tulis materi dengan jelas..."></textarea>

<button class="generate" onclick="generatePrompt()">⚡ Generate Prompt</button>

<textarea id="hasil" placeholder="Hasil prompt muncul di sini..."></textarea>

<button class="copy" onclick="copyPrompt()">📋 Salin</button>

<div id="notif">✅ Berhasil disalin</div>

</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/lkpd/sw.js")
    .then(() => console.log("SW SUCCESS"))
    .catch(err => console.log("SW ERROR:", err));
}

function generatePrompt(){
  const kelas = document.getElementById("kelas").value;
  const mapel = document.getElementById("mapel").value;
  const media = document.getElementById("media").value;
  const materi = document.getElementById("materi").value;

  if(!materi){
    alert("Materi belum diisi!");
    return;
  }

  const prompt = `Buat ${media} untuk ${kelas} mapel ${mapel} dengan materi: ${materi}`;
  document.getElementById("hasil").value = prompt;
}

function copyPrompt(){
  const text = document.getElementById("hasil");
  text.select();
  document.execCommand("copy");

  const notif = document.getElementById("notif");
  notif.style.display = "block";
  setTimeout(()=>notif.style.display="none",2000);
}
</script>

</body>
</html>
